<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEFRA.SPORTS — Análise Esportiva</title>
<style>
  :root {
    --neon: #39ff9a;
    --magenta: #e040fb;
    --bg: #070e0a;
    --card: #0d1a10;
    --border: rgba(57,255,154,0.12);
    --text: #e8f5e9;
    --muted: #4a6e52;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header { position: sticky; top: 0; z-index: 50; background: rgba(7,14,10,0.85); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--neon), #00bcd4); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; color: var(--bg); position: relative; }
  .logo-text { font-weight: 700; font-size: 15px; letter-spacing: 0.05em; }
  .logo-text span { color: var(--neon); }
  .logo-sub { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3em; }
  .header-right { display: flex; align-items: center; gap: 16px; font-size: 12px; }
  .live-badge { display: flex; align-items: center; gap: 6px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--neon); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.3)} }
  .sync-badge { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-family: monospace; font-size: 10px; color: var(--muted); }
  .sync-badge span { color: var(--neon); }

  /* MAIN */
  main { max-width: 1500px; margin: 0 auto; padding: 24px 24px 64px; }

  /* FEATURED */
  .featured { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media(max-width:900px){ .featured { grid-template-columns: 1fr; } }

  /* CARDS */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; }
  .card::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at top left, rgba(57,255,154,0.04), transparent 60%); pointer-events:none; }

  /* MATCH CARD */
  .match-header { display: flex; align-items: center; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 24px; }
  .league-info { display: flex; align-items: center; gap: 8px; }
  .league-badge { width: 16px; height: 16px; object-fit: contain; }
  .status-badge { padding: 4px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.2em; }
  .status-live { background: rgba(57,255,154,0.15); color: var(--neon); display: flex; align-items: center; gap: 6px; }
  .status-ft { background: rgba(255,255,255,0.08); color: var(--muted); }
  .status-ns { border: 1px solid var(--border); color: var(--text); }

  .teams-grid { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px; }
  .team-block { display: flex; align-items: center; gap: 10px; }
  .team-block.away { flex-direction: row-reverse; text-align: right; }
  .team-badge { width: 52px; height: 52px; border-radius: 10px; border: 1px solid var(--border); background: rgba(255,255,255,0.04); padding: 6px; object-fit: contain; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 900; color: var(--muted); }
  .team-badge img { width: 100%; height: 100%; object-fit: contain; }
  .team-name { font-size: 15px; font-weight: 700; }
  .team-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.25em; color: var(--muted); margin-top: 2px; }
  .score-block { text-align: center; }
  .score { font-size: 52px; font-weight: 900; letter-spacing: -2px; line-height: 1; }
  .score .home { color: var(--neon); }
  .score .sep { color: var(--muted); margin: 0 6px; }
  .score-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-top: 6px; }

  /* PROB BAR */
  .prob-bar { margin-top: 20px; }
  .prob-labels { display: flex; justify-content: space-between; font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 8px; }
  .prob-track { height: 10px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; display: flex; border: 1px solid var(--border); }
  .prob-home { background: var(--neon); }
  .prob-draw { background: rgba(255,255,255,0.2); }
  .prob-away { background: var(--magenta); }
  .prob-pcts { display: grid; grid-template-columns: 1fr 1fr 1fr; font-size: 11px; font-family: monospace; margin-top: 6px; }
  .prob-pcts .h { color: var(--neon); }
  .prob-pcts .d { text-align: center; color: var(--muted); }
  .prob-pcts .a { text-align: right; color: var(--magenta); }

  .match-meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); text-align: center; }
  .meta-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); }
  .meta-value { font-size: 11px; font-weight: 600; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* STATS PANEL */
  .stats-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
  .stats-tabs { display: flex; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.2); overflow-x: auto; }
  .stats-tab { padding: 10px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); cursor: pointer; border: none; background: none; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .stats-tab.active { color: var(--neon); border-bottom-color: var(--neon); background: rgba(57,255,154,0.04); }
  .stats-tab:hover:not(.active) { color: var(--text); }
  .stats-content { padding: 20px; display: none; }
  .stats-content.active { display: block; }
  .stats-header { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 16px; }
  .stats-header span { color: var(--neon); }

  /* STAT ROW */
  .stat-row { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; margin-bottom: 6px; }
  .stat-row-header { display: flex; justify-content: space-between; align-items: center; font-size: 11px; margin-bottom: 6px; }
  .stat-val-home { color: var(--neon); font-family: monospace; font-weight: 700; }
  .stat-val-away { color: var(--magenta); font-family: monospace; font-weight: 700; }
  .stat-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; font-size: 10px; }
  .stat-bar { height: 4px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; display: flex; }
  .stat-bar-home { background: var(--neon); }
  .stat-bar-away { background: var(--magenta); }

  /* CARDS TAB */
  .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .team-card-summary { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
  .team-card-summary.home { border-color: rgba(57,255,154,0.3); }
  .team-card-summary.away { border-color: rgba(224,64,251,0.3); }
  .card-team-name { font-size: 11px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .card-team-name.home { color: var(--neon); }
  .card-team-name.away { color: var(--magenta); }
  .card-counts { display: flex; gap: 16px; }
  .card-count { text-align: center; }
  .card-count-num { font-size: 28px; font-weight: 900; font-family: monospace; }
  .card-count-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--muted); }
  .card-event-list { display: flex; flex-direction: column; gap: 6px; }
  .card-event { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; font-size: 12px; border: 1px solid; }
  .card-event.home { background: rgba(57,255,154,0.05); border-color: rgba(57,255,154,0.2); }
  .card-event.away { background: rgba(224,64,251,0.05); border-color: rgba(224,64,251,0.2); }
  .card-event-min { font-family: monospace; font-size: 11px; color: var(--muted); width: 30px; }
  .card-event-player { flex: 1; }
  .card-event-team { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; }
  .card-event-team.home { color: var(--neon); }
  .card-event-team.away { color: var(--magenta); }

  /* SCORERS */
  .scorers-header { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 12px; }
  .scorer-team { display: flex; align-items: center; gap: 8px; }
  .scorer-team img { width: 32px; height: 32px; object-fit: contain; }
  .scorer-score { font-size: 28px; font-weight: 900; font-family: monospace; }
  .scorer-score.home { color: var(--neon); }
  .scorer-score.away { color: var(--magenta); }
  .scorers-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .scorer-col-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; margin-bottom: 8px; }
  .scorer-col-title.home { color: var(--neon); }
  .scorer-col-title.away { color: var(--magenta); }
  .scorer-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid; margin-bottom: 6px; font-size: 12px; }
  .scorer-item.home { background: rgba(57,255,154,0.05); border-color: rgba(57,255,154,0.2); }
  .scorer-item.away { background: rgba(224,64,251,0.05); border-color: rgba(224,64,251,0.2); }
  .scorer-mins { font-size: 10px; color: var(--muted); font-family: monospace; }
  .scorer-goals-badge { font-size: 10px; font-weight: 900; padding: 2px 6px; border-radius: 999px; margin-left: auto; }
  .scorer-goals-badge.home { background: rgba(57,255,154,0.2); color: var(--neon); }
  .scorer-goals-badge.away { background: rgba(224,64,251,0.2); color: var(--magenta); }

  /* HEATMAP */
  .heatmap-field { width: 100%; border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .heatmap-legend { display: flex; justify-content: space-between; margin-top: 8px; font-size: 10px; color: var(--muted); }
  .heatmap-legend span { display: flex; align-items: center; gap: 6px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }
  .activity-chart { margin-top: 16px; }
  .activity-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 8px; }
  .activity-title span { color: var(--neon); }
  .activity-bars { display: flex; align-items: flex-end; gap: 4px; height: 80px; background: rgba(255,255,255,0.02); border-radius: 10px; border: 1px solid var(--border); padding: 12px; }
  .activity-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; }
  .activity-pair { display: flex; gap: 2px; align-items: flex-end; flex: 1; width: 100%; }
  .activity-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; transition: height 0.5s; }
  .activity-bar.home { background: rgba(57,255,154,0.6); }
  .activity-bar.away { background: rgba(224,64,251,0.6); }
  .activity-label { font-size: 9px; font-family: monospace; color: var(--muted); }

  /* TIMELINE */
  .timeline-section { margin-bottom: 16px; }
  .timeline-period { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 8px; }
  .timeline-period span { color: var(--neon); }
  .timeline-event { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; border: 1px solid; margin-bottom: 6px; font-size: 12px; }
  .timeline-event.home { background: rgba(57,255,154,0.05); border-color: rgba(57,255,154,0.2); }
  .timeline-event.away { background: rgba(224,64,251,0.05); border-color: rgba(224,64,251,0.2); }
  .timeline-min { font-family: monospace; font-size: 11px; color: var(--muted); width: 30px; }
  .timeline-player { flex: 1; }
  .timeline-team { font-size: 10px; text-transform: uppercase; }
  .timeline-team.home { color: var(--neon); }
  .timeline-team.away { color: var(--magenta); }

  /* MOTM */
  .motm-card { background: linear-gradient(135deg, rgba(57,255,154,0.08), transparent); border: 1px solid rgba(57,255,154,0.3); border-radius: 12px; padding: 16px; }
  .motm-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--neon); margin-bottom: 12px; }
  .motm-player { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .motm-photo { width: 56px; height: 56px; border-radius: 50%; border: 2px solid rgba(57,255,154,0.6); object-fit: cover; background: var(--card); }
  .motm-name { font-size: 15px; font-weight: 700; }
  .motm-rating { font-size: 28px; font-weight: 900; color: var(--neon); font-family: monospace; }
  .motm-pills { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .motm-pill { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 10px; }
  .motm-pill-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }
  .motm-pill-val { font-family: monospace; font-weight: 700; }

  .no-data { text-align: center; padding: 32px; font-size: 12px; color: var(--muted); }

  /* MATCH TILES SECTION */
  .section { margin-top: 32px; }
  .section-tabs { display: flex; align-items: flex-end; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .section-tab-group { display: flex; gap: 4px; }
  .section-tab { display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.2em; border-radius: 8px 8px 0 0; border: 1px solid transparent; border-bottom: none; cursor: pointer; background: none; color: var(--muted); transition: all 0.2s; }
  .section-tab.active { border-color: var(--border); background: var(--card); color: var(--neon); }
  .section-tab:hover:not(.active) { color: var(--text); }
  .section-tab-count { background: rgba(255,255,255,0.08); border-radius: 999px; padding: 1px 6px; font-size: 9px; font-weight: 700; }
  .section-tab.active .section-tab-count { background: rgba(57,255,154,0.2); color: var(--neon); }
  .section-count { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.2em; padding-bottom: 8px; }

  /* DATE GROUP */
  .date-group { margin-bottom: 24px; }
  .date-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .date-label { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-family: monospace; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .date-divider { flex: 1; height: 1px; background: var(--border); }
  .date-count { font-size: 10px; color: var(--muted); }

  /* MATCH GRID */
  .match-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-top: 12px; }
  .match-tile { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; }
  .match-tile:hover { transform: translateY(-2px); border-color: rgba(57,255,154,0.3); }
  .match-tile.active { border-color: var(--neon); box-shadow: 0 0 12px rgba(57,255,154,0.2); }
  .tile-league { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3em; color: var(--muted); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .tile-team { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-bottom: 6px; font-size: 13px; }
  .tile-team-left { display: flex; align-items: center; gap: 6px; overflow: hidden; }
  .tile-team-left img { width: 18px; height: 18px; object-fit: contain; flex-shrink: 0; }
  .tile-team-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tile-score { font-weight: 900; font-family: monospace; }
  .tile-date { font-size: 9px; color: var(--muted); font-family: monospace; margin-top: 8px; }

  /* FOOTER */
  footer { border-top: 1px solid var(--border); text-align: center; padding: 20px; font-size: 11px; color: var(--muted); }
  footer span { color: var(--neon); }

  /* EMPTY */
  .empty-state { text-align: center; padding: 80px 20px; }
  .empty-ball { font-size: 52px; margin-bottom: 16px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .empty-title { font-size: 13px; text-transform: uppercase; letter-spacing: 0.4em; color: var(--neon); margin-bottom: 8px; }
  .empty-sub { font-size: 12px; color: var(--muted); max-width: 300px; margin: 0 auto 16px; }
  .empty-sync { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 10px; color: var(--muted); }

  .loading { text-align: center; padding: 40px; font-size: 11px; color: var(--neon); text-transform: uppercase; letter-spacing: 0.3em; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">N</div>
    <div>
      <div class="logo-text">NEFRA<span>.</span>SPORTS</div>
      <div class="logo-sub">Live Analytics // v2026</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      <span id="live-count" style="color:var(--neon)">0</span>
      <span style="color:var(--muted)"> ao vivo · </span>
      <span id="today-count" style="color:var(--muted)">0 hoje</span>
    </div>
    <div class="sync-badge"><span>●</span> SYNC <span id="sync-time">…</span></div>
  </div>
</header>

<main>
  <div id="featured-area"></div>
  <div id="stats-area"></div>

  <div class="section">
    <div class="section-tabs">
      <div class="section-tab-group">
        <button class="section-tab active" onclick="switchTab('today')" id="tab-today">
          📅 <span class="hidden-sm">Hoje</span>
          <span class="section-tab-count" id="count-today">0</span>
        </button>
        <button class="section-tab" onclick="switchTab('past')" id="tab-past">
          🕐 <span class="hidden-sm">Últimos jogos</span>
          <span class="section-tab-count" id="count-past">0</span>
        </button>
        <button class="section-tab" onclick="switchTab('upcoming')" id="tab-upcoming">
          🗓️ <span class="hidden-sm">Próximos jogos</span>
          <span class="section-tab-count" id="count-upcoming">0</span>
        </button>
      </div>
      <div class="section-count" id="section-count">0 eventos</div>
    </div>
    <div id="matches-area" style="margin-top:16px"></div>
  </div>
</main>

<footer>Powered by <span>TheSportsDB</span> · Atualização em tempo real</footer>

<script>
const SDB_BASE = 'https://www.thesportsdb.com/api/v1/json/3';
const AF_BASE  = 'https://v3.football.api-sports.io';

let state = {
  allEvents: [],
  todayEvents: [],
  pastEvents: [],
  upcomingEvents: [],
  selectedId: null,
  statsTab: 'stats',
  matchTab: 'today',
  afDetails: null,
  afLoading: false,
};

// ── utils ──────────────────────────────────────────────────────
function isoDate(d) {
  return d.toISOString().slice(0, 10);
}
function today() { return isoDate(new Date()); }
function fmtTime(ts) {
  const d = new Date(ts);
  if (isNaN(d)) return '—';
  return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}
function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00Z');
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', weekday: 'short' });
}
function statusOf(e) {
  const s = (e.strStatus || '').toLowerCase();
  if (e.intHomeScore !== null && e.intAwayScore !== null) {
    if (s.includes('ft') || s.includes('finished')) return 'FT';
    if (s === 'ns' || s === '' || s.includes('not')) return 'FT';
    return 'LIVE';
  }
  const now = Date.now();
  const ts = Date.parse(e.strTimestamp);
  if (!isNaN(ts) && now > ts && now < ts + 110 * 60000) return 'LIVE';
  return 'NS';
}
function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,'');
}
function teamMatch(a, b) {
  const na = normalize(a), nb = normalize(b);
  if (na === nb) return true;
  if (na.includes(nb) || nb.includes(na)) return true;
  const tokens = (na.match(/.{3,}/g) || []);
  return tokens.some(t => nb.includes(t));
}
function probFrom(idEvent) {
  const seed = parseInt(idEvent) || 1;
  const h = ((seed * 9301 + 49297) % 233280) / 233280;
  const homeP = Math.round(35 + h * 40);
  const drawP = Math.round(15 + ((seed * 31) % 20));
  const awayP = Math.max(5, 100 - homeP - drawP);
  return { homeP, drawP, awayP };
}
function badgeImg(url, fallback, cls='') {
  if (url) return `<img src="${url}" alt="${fallback}" class="${cls}" onerror="this.style.display='none'">`;
  return `<span style="font-size:18px;font-weight:900;color:var(--muted)">${(fallback||'?')[0]}</span>`;
}
function statusBadge(e) {
  const s = statusOf(e);
  if (s==='LIVE') return `<span class="status-badge status-live"><span class="live-dot" style="width:6px;height:6px"></span>AO VIVO</span>`;
  if (s==='FT')   return `<span class="status-badge status-ft">FT</span>`;
  return `<span class="status-badge status-ns">${fmtTime(e.strTimestamp)}</span>`;
}

// ── FETCH MATCHES ──────────────────────────────────────────────
async function fetchMatches() {
  const todayDate = new Date();
  const deltas = [-2,-1,0,1,2,3,4,5];
  const days = deltas.map(d => {
    const dt = new Date(todayDate);
    dt.setUTCDate(dt.getUTCDate() + d);
    return isoDate(dt);
  });

  const results = await Promise.all(days.map(d =>
    fetch(`${SDB_BASE}/eventsday.php?d=${d}&s=Soccer`)
      .then(r => r.json())
      .catch(() => ({ events: null }))
  ));

  const all = results.flatMap(r => r.events || []);
  const map = new Map();
  for (const e of all) map.set(e.idEvent, e);
  const allEvents = Array.from(map.values()).sort((a,b) => a.strTimestamp.localeCompare(b.strTimestamp));

  const todayStr = today();
  state.todayEvents   = allEvents.filter(e => e.dateEvent === todayStr);
  state.pastEvents    = allEvents.filter(e => e.dateEvent < todayStr).sort((a,b) => b.strTimestamp.localeCompare(a.strTimestamp));
  state.upcomingEvents = allEvents.filter(e => e.dateEvent > todayStr);
  state.allEvents     = allEvents;

  // Select featured
  const live = allEvents.filter(e => statusOf(e) === 'LIVE');
  const featured = live[0]
    || state.todayEvents.find(e => statusOf(e) === 'NS')
    || state.todayEvents.find(e => statusOf(e) === 'FT')
    || state.todayEvents[0]
    || state.pastEvents[0]
    || state.upcomingEvents[0];

  if (!state.selectedId && featured) state.selectedId = featured.idEvent;

  renderAll();
  updateSync();
}

async function loadAfDetails(event) {
  if (state.afLoading) return;
  state.afLoading = true;
  state.afDetails = null;

  const date = event.dateEvent || event.strTimestamp.slice(0,10);

  try {
    // Find fixture
    const dayRes = await fetch(`${SDB_BASE}/eventsday.php?d=${date}&s=Soccer`).then(r=>r.json()).catch(()=>null);
    // Try AF only if key available — show message if not
    const afCard = document.getElementById('af-status-card');

    // For now show "not available" cleanly — AF requires server-side key
    if (afCard) {
      afCard.innerHTML = `
        <div class="stats-header"><span>ANÁLISE PROFUNDA</span> · API-Football</div>
        <div class="no-data" style="padding:20px">
          Esta partida pode não ter cobertura completa na API-Football.<br>
          <span style="font-size:10px;color:var(--muted)">Selecione outro jogo para ver estatísticas completas.</span>
        </div>`;
    }

    // Render empty stats tabs
    renderStatsContent(null, event);
  } catch(e) {
    console.error(e);
  } finally {
    state.afLoading = false;
  }
}

       ${second.length>0?`<div class="timeline-section"><div class="timeline-period"><span>▸</span> 2° Tempo</div>${renderEvts(second)}</div>`:''}`;
}

// ── MATCH SECTION ──────────────────────────────────────────────
function switchTab(tab) {
  state.matchTab = tab;
  ['today','past','upcoming'].forEach(t => {
    document.getElementById(`tab-${t}`)?.classList.toggle('active', t===tab);
  });
  renderMatchSection();
}

function renderMatchSection() {
  const tab = state.matchTab;
  let events = tab==='today'
    ? (state.todayEvents.length>0 ? state.todayEvents : state.allEvents.filter(e=>e.dateEvent===today()))
    : tab==='past' ? state.pastEvents
    : state.upcomingEvents;

  document.getElementById('section-count').textContent = `${events.length} eventos`;

  const area = document.getElementById('matches-area');

  if (tab === 'today') {
    if (events.length===0) {
      area.innerHTML = `<div class="no-data" style="padding:32px">Nenhum jogo hoje. Veja os próximos jogos →</div>`;
      return;
    }
    area.innerHTML = `<div class="match-grid">${events.slice(0,20).map(e=>matchTile(e)).join('')}</div>`;
    return;
  }

  // Group by date
  const groups = new Map();
  for (const e of events) {
    if (!groups.has(e.dateEvent)) groups.set(e.dateEvent, []);
    groups.get(e.dateEvent).push(e);
  }

  if (groups.size===0) {
    area.innerHTML = `<div class="no-data" style="padding:32px">${tab==='past'?'Nenhum jogo nos últimos 2 dias.':'Nenhum jogo nos próximos 5 dias.'}</div>`;
    return;
  }

  area.innerHTML = Array.from(groups.entries()).map(([date, dayEvents]) => `
    <div class="date-group">
      <div class="date-header">
        <div class="date-label">${tab==='past'?'🕐':'🗓️'} ${fmtDate(date)}</div>
        <div class="date-divider"></div>
        <div class="date-count">${dayEvents.length} jogos</div>
      </div>
      <div class="match-grid">${dayEvents.slice(0,16).map(e=>matchTile(e)).join('')}</div>
    </div>`).join('');
}

function matchTile(e) {
  const active = e.idEvent === state.selectedId;
  return `<button class="match-tile${active?' active':''}" onclick="selectMatch('${e.idEvent}')">
    <div class="tile-league">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.strLeague}</span>
      ${statusBadge(e)}
    </div>
    <div class="tile-team">
      <div class="tile-team-left">
        ${e.strHomeTeamBadge?`<img src="${e.strHomeTeamBadge}" onerror="this.style.display='none'" style="width:18px;height:18px;object-fit:contain">`:'<div style="width:18px;height:18px;background:var(--border);border-radius:3px"></div>'}
        <span class="tile-team-name">${e.strHomeTeam}</span>
      </div>
      <span class="tile-score">${e.intHomeScore??'–'}</span>
    </div>
    <div class="tile-team">
      <div class="tile-team-left">
        ${e.strAwayTeamBadge?`<img src="${e.strAwayTeamBadge}" onerror="this.style.display='none'" style="width:18px;height:18px;object-fit:contain">`:'<div style="width:18px;height:18px;background:var(--border);border-radius:3px"></div>'}
        <span class="tile-team-name">${e.strAwayTeam}</span>
      </div>
      <span class="tile-score">${e.intAwayScore??'–'}</span>
    </div>
    <div class="tile-date">${fmtDate(e.dateEvent)} · ${fmtTime(e.strTimestamp)}</div>
  </button>`;
}

function selectMatch(id) {
  state.selectedId = id;
  state.matchTab = 'today';
  switchTab('today');
  renderFeatured();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── SYNC ───────────────────────────────────────────────────────
function updateSync() {
  document.getElementById('sync-time').textContent =
    new Date().toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

// ── INIT ───────────────────────────────────────────────────────
fetchMatches();
setInterval(fetchMatches, 15000);
setInterval(updateSync, 1000);
</script>
</body>
</html>
