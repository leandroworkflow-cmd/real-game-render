<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEFRA.SPORTS — Análise Esportiva</title>
<style>
:root {
  --neon: #39ff9a; --magenta: #e040fb;
  --bg: #070e0a; --card: #0d1a10;
  --border: rgba(57,255,154,0.12); --text: #e8f5e9; --muted: #4a6e52;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* HEADER */
header{position:sticky;top:0;z-index:50;background:rgba(7,14,10,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--neon),#00bcd4);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:var(--bg)}
.logo-text{font-weight:700;font-size:15px;letter-spacing:.05em}
.logo-text span{color:var(--neon)}
.logo-sub{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3em}
.header-right{display:flex;align-items:center;gap:16px;font-size:12px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--neon);display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-badge{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:monospace;font-size:10px;color:var(--muted)}
.sync-badge b{color:var(--neon)}

/* MAIN */
main{max-width:1500px;margin:0 auto;padding:24px 24px 64px}

/* SKELETON */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,rgba(57,255,154,0.05) 50%,var(--card) 75%);background-size:400% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
.skeleton-hero{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.skeleton-card{height:380px}
.skeleton-stats{height:120px;margin-bottom:24px}
@media(max-width:900px){.skeleton-hero{grid-template-columns:1fr}}

/* FEATURED */
.featured{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.featured{grid-template-columns:1fr}}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,rgba(57,255,154,0.04),transparent 60%);pointer-events:none}

/* MATCH CARD */
.match-header{display:flex;align-items:center;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted);margin-bottom:20px}
.league-info{display:flex;align-items:center;gap:8px}
.status-badge{padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2em}
.status-live{background:rgba(57,255,154,.15);color:var(--neon);display:flex;align-items:center;gap:6px}
.status-ft{background:rgba(255,255,255,.08);color:var(--muted)}
.status-ns{border:1px solid var(--border);color:var(--text)}
.teams-grid{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.team-block{display:flex;align-items:center;gap:10px}
.team-block.away{flex-direction:row-reverse;text-align:right}
.team-badge-wrap{width:52px;height:52px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);padding:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.team-badge-wrap img{width:100%;height:100%;object-fit:contain}
.team-badge-wrap .fb{font-size:18px;font-weight:900;color:var(--muted)}
.team-name{font-size:15px;font-weight:700}
.team-label{font-size:9px;text-transform:uppercase;letter-spacing:.25em;color:var(--muted);margin-top:2px}
.score-block{text-align:center}
.score{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1}
.score .h{color:var(--neon)}
.score .sep{color:var(--muted);margin:0 4px}
.score-label{font-size:9px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted);margin-top:6px}
.prob-bar{margin-top:20px}
.prob-labels{display:flex;justify-content:space-between;font-size:10px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted);margin-bottom:6px}
.prob-track{height:10px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;display:flex;border:1px solid var(--border)}
.prob-home{background:var(--neon)}
.prob-draw{background:rgba(255,255,255,.2)}
.prob-away{background:var(--magenta)}
.prob-pcts{display:grid;grid-template-columns:1fr 1fr 1fr;font-size:11px;font-family:monospace;margin-top:6px}
.prob-pcts .h{color:var(--neon)}
.prob-pcts .d{text-align:center;color:var(--muted)}
.prob-pcts .a{text-align:right;color:var(--magenta)}
.match-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.meta-label{font-size:9px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted)}
.meta-value{font-size:11px;font-weight:600;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* EVENTS CARD */
.events-card{padding:16px}
.events-title{font-size:10px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted);margin-bottom:12px}
.events-title span{color:var(--neon)}
.event-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;font-size:11px;border:1px solid;margin:3px}
.event-chip.home{border-color:rgba(57,255,154,.3);background:rgba(57,255,154,.06);color:var(--neon)}
.event-chip.away{border-color:rgba(224,64,251,.3);background:rgba(224,64,251,.06);color:var(--magenta)}
.event-chip .min{font-family:monospace;color:var(--muted)}
.event-chip .name{color:var(--text)}

/* STATS PANEL */
.stats-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px}
.stats-tabs{display:flex;border-bottom:1px solid var(--border);background:rgba(0,0,0,.2);overflow-x:auto}
.stab{padding:10px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);cursor:pointer;border:none;background:none;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.stab.active{color:var(--neon);border-bottom-color:var(--neon);background:rgba(57,255,154,.04)}
.stab:hover:not(.active){color:var(--text)}
.scontent{padding:20px;display:none}
.scontent.active{display:block}

/* STAT ROW */
.stat-row{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:8px 12px;margin-bottom:6px}
.srh{display:flex;justify-content:space-between;align-items:center;font-size:11px;margin-bottom:5px}
.sv-h{color:var(--neon);font-family:monospace;font-weight:700;width:40px}
.sv-a{color:var(--magenta);font-family:monospace;font-weight:700;width:40px;text-align:right}
.sl{color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:10px;text-align:center;flex:1}
.sbar{height:4px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden;display:flex}
.sbar-h{background:var(--neon)}
.sbar-a{background:var(--magenta)}

/* CARDS TAB */
.cards-summary{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cteam{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:14px}
.cteam.home{border-color:rgba(57,255,154,.3)}
.cteam.away{border-color:rgba(224,64,251,.3)}
.cteam-name{font-size:11px;font-weight:700;margin-bottom:10px}
.cteam-name.home{color:var(--neon)}
.cteam-name.away{color:var(--magenta)}
.ccounts{display:flex;gap:20px}
.ccount-num{font-size:26px;font-weight:900;font-family:monospace}
.ccount-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.2em;color:var(--muted)}
.cevent{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid;margin-bottom:6px;font-size:12px}
.cevent.home{background:rgba(57,255,154,.05);border-color:rgba(57,255,154,.2)}
.cevent.away{background:rgba(224,64,251,.05);border-color:rgba(224,64,251,.2)}
.cevent-min{font-family:monospace;font-size:11px;color:var(--muted);width:28px}
.cevent-player{flex:1}
.cevent-team{font-size:10px;text-transform:uppercase}
.cevent-team.home{color:var(--neon)}
.cevent-team.away{color:var(--magenta)}

/* SCORERS */
.scorers-hdr{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:12px}
.scorer-side{display:flex;align-items:center;gap:8px}
.scorer-side img{width:30px;height:30px;object-fit:contain}
.scorer-sc{font-size:26px;font-weight:900;font-family:monospace}
.scorer-sc.home{color:var(--neon)}
.scorer-sc.away{color:var(--magenta)}
.scorers-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scol-title{font-size:10px;text-transform:uppercase;letter-spacing:.3em;margin-bottom:8px}
.scol-title.home{color:var(--neon)}
.scol-title.away{color:var(--magenta)}
.sitem{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid;margin-bottom:6px;font-size:12px}
.sitem.home{background:rgba(57,255,154,.05);border-color:rgba(57,255,154,.2)}
.sitem.away{background:rgba(224,64,251,.05);border-color:rgba(224,64,251,.2)}
.sitem-mins{font-size:10px;color:var(--muted);font-family:monospace}
.gbadge{font-size:10px;font-weight:900;padding:2px 6px;border-radius:999px;margin-left:auto}
.gbadge.home{background:rgba(57,255,154,.2);color:var(--neon)}
.gbadge.away{background:rgba(224,64,251,.2);color:var(--magenta)}

/* HEATMAP */
.hfield{width:100%;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.hlegend{display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:var(--muted)}
.hlegend span{display:flex;align-items:center;gap:6px}
.ldot{width:10px;height:10px;border-radius:2px;display:inline-block}
.abars{display:flex;align-items:flex-end;gap:4px;height:80px;background:rgba(255,255,255,.02);border-radius:10px;border:1px solid var(--border);padding:12px;margin-top:12px}
.acol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%}
.apair{display:flex;gap:2px;align-items:flex-end;flex:1;width:100%}
.abar{flex:1;border-radius:2px 2px 0 0;min-height:2px;transition:height .5s}
.abar.h{background:rgba(57,255,154,.6)}
.abar.a{background:rgba(224,64,251,.6)}
.albl{font-size:9px;font-family:monospace;color:var(--muted)}

/* TIMELINE */
.tperiod{font-size:10px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted);margin-bottom:8px;margin-top:16px}
.tperiod span{color:var(--neon)}
.tperiod:first-child{margin-top:0}
.tevent{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;border:1px solid;margin-bottom:6px;font-size:12px}
.tevent.home{background:rgba(57,255,154,.05);border-color:rgba(57,255,154,.2)}
.tevent.away{background:rgba(224,64,251,.05);border-color:rgba(224,64,251,.2)}
.tmin{font-family:monospace;font-size:11px;color:var(--muted);width:28px}
.tplayer{flex:1}
.tteam{font-size:10px;text-transform:uppercase}
.tteam.home{color:var(--neon)}
.tteam.away{color:var(--magenta)}

/* LINEUPS CARD */
.lineups-card{padding:16px}
.lineups-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.lteam-title{font-size:10px;text-transform:uppercase;letter-spacing:.3em;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.lteam-title.home{color:var(--neon)}
.lteam-title.away{color:var(--magenta)}
.lsection{margin-bottom:10px}
.lsec-title{font-size:9px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted);margin-bottom:4px}
.litem{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;border:1px solid;margin-bottom:4px;font-size:11px}
.litem.home{background:rgba(57,255,154,.04);border-color:rgba(57,255,154,.15)}
.litem.away{background:rgba(224,64,251,.04);border-color:rgba(224,64,251,.15)}
.lnum{width:20px;text-align:center;font-family:monospace;font-weight:700;font-size:11px}
.lnum.home{color:var(--neon)}
.lnum.away{color:var(--magenta)}
.lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lpos{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:2px 5px;border-radius:4px}
.lpos.home{background:rgba(57,255,154,.15);color:var(--neon)}
.lpos.away{background:rgba(224,64,251,.15);color:var(--magenta)}
.formation-badge{font-size:10px;color:rgba(57,255,154,.6);margin-left:6px}

/* SECTION TABS */
.section{margin-top:24px}
.section-tabs{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border)}
.stab-group{display:flex;gap:4px}
.mtab{display:flex;align-items:center;gap:6px;padding:8px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.2em;border-radius:8px 8px 0 0;border:1px solid transparent;border-bottom:none;cursor:pointer;background:none;color:var(--muted);transition:all .2s}
.mtab.active{border-color:var(--border);background:var(--card);color:var(--neon)}
.mtab:hover:not(.active){color:var(--text)}
.mtab-count{background:rgba(255,255,255,.08);border-radius:999px;padding:1px 6px;font-size:9px;font-weight:700}
.mtab.active .mtab-count{background:rgba(57,255,154,.2);color:var(--neon)}
.section-info{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.2em;padding-bottom:8px}

/* DATE GROUP */
.date-group{margin:16px 0 24px}
.date-header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.date-label{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:monospace;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.date-divider{flex:1;height:1px;background:var(--border)}
.date-count{font-size:10px;color:var(--muted)}

/* MATCH GRID */
.match-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;margin-top:12px}
.mtile{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;text-align:left;width:100%}
.mtile:hover{transform:translateY(-2px);border-color:rgba(57,255,154,.3)}
.mtile.active{border-color:var(--neon);box-shadow:0 0 14px rgba(57,255,154,.2)}
.mtile-league{font-size:9px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:4px}
.mtile-league-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mteam{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:6px;font-size:13px}
.mteam-left{display:flex;align-items:center;gap:6px;overflow:hidden}
.mteam-left img{width:18px;height:18px;object-fit:contain;flex-shrink:0}
.mteam-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mteam-score{font-weight:900;font-family:monospace;flex-shrink:0}
.mtile-date{font-size:9px;color:var(--muted);font-family:monospace;margin-top:8px}

.no-data{text-align:center;padding:32px;font-size:12px;color:var(--muted)}
footer{border-top:1px solid var(--border);text-align:center;padding:20px;font-size:11px;color:var(--muted)}
footer span{color:var(--neon)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">N</div>
    <div>
      <div class="logo-text">NEFRA<span>.</span>SPORTS</div>
      <div class="logo-sub">Live Analytics // v2026</div>
    </div>
  </div>
  <div class="header-right">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="live-dot"></span>
      <span><b id="live-count" style="color:var(--neon)">0</b> <span style="color:var(--muted)">ao vivo · <span id="today-count">0</span> hoje</span></span>
    </div>
    <div class="sync-badge"><b>●</b> SYNC <span id="sync-time">…</span></div>
  </div>
</header>

<main>
  <!-- Skeleton shown immediately -->
  <div id="skeleton" style="display:block">
    <div class="skeleton-hero">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>
    <div class="skeleton skeleton-stats"></div>
  </div>

  <div id="featured-area" style="display:none"></div>
  <div id="stats-area" style="display:none"></div>

  <div class="section">
    <div class="section-tabs">
      <div class="stab-group">
        <button class="mtab active" onclick="switchTab('today')" id="tab-btn-today">
          📅 <span>Hoje</span> <span class="mtab-count" id="cnt-today">…</span>
        </button>
        <button class="mtab" onclick="switchTab('past')" id="tab-btn-past">
          🕐 <span>Últimos jogos</span> <span class="mtab-count" id="cnt-past">…</span>
        </button>
        <button class="mtab" onclick="switchTab('upcoming')" id="tab-btn-upcoming">
          🗓️ <span>Próximos jogos</span> <span class="mtab-count" id="cnt-upcoming">…</span>
        </button>
      </div>
      <div class="section-info" id="section-info">carregando…</div>
    </div>
    <div id="matches-area" style="margin-top:12px">
      <div class="match-grid">
        ${Array(8).fill('<div class="skeleton" style="height:110px;border-radius:12px"></div>').join('')}
      </div>
    </div>
  </div>
</main>

<footer>Powered by <span>TheSportsDB</span> · Atualização em tempo real</footer>

<script>
const BASE = 'https://www.thesportsdb.com/api/v1/json/3';

let S = {
  all:[], today:[], past:[], upcoming:[],
  selectedId: null,
  matchTab: 'today',
  statsTab: 'stats',
};

// ── UTILS ──────────────────────────────────────────────────────
function isoDate(d){ return d.toISOString().slice(0,10); }
function todayStr(){ return isoDate(new Date()); }
function fmtTime(ts){
  const d=new Date(ts); if(isNaN(d))return'—';
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}
function fmtDate(ds){
  const d=new Date(ds+'T12:00:00Z');
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',weekday:'short'});
}
function statusOf(e){
  const s=(e.strStatus||'').toLowerCase();
  if(e.intHomeScore!==null&&e.intAwayScore!==null){
    if(s.includes('ft')||s.includes('finished'))return'FT';
    if(s==='ns'||s===''||s.includes('not'))return'FT';
    return'LIVE';
  }
  const now=Date.now(), ts=Date.parse(e.strTimestamp);
  if(!isNaN(ts)&&now>ts&&now<ts+110*60000)return'LIVE';
  return'NS';
}
function prob(id){
  const seed=parseInt(id)||1;
  const h=((seed*9301+49297)%233280)/233280;
  const hp=Math.round(35+h*40), dp=Math.round(15+((seed*31)%20));
  return{hp,dp,ap:Math.max(5,100-hp-dp)};
}
function sbadge(e){
  const s=statusOf(e);
  if(s==='LIVE')return`<span class="status-badge status-live"><span class="live-dot" style="width:6px;height:6px"></span>AO VIVO</span>`;
  if(s==='FT')return`<span class="status-badge status-ft">FT</span>`;
  return`<span class="status-badge status-ns">${fmtTime(e.strTimestamp)}</span>`;
}
function tbadge(url,name){
  if(url)return`<img src="${url}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:contain">`;
  return`<span class="fb">${(name||'?')[0]}</span>`;
}
function icon(type,detail){
  if(type==='Goal')return'⚽';
  if(type==='Card'){
    const d=detail.toLowerCase();
    if(d.includes('red')||d.includes('second yellow'))return'🟥';
    return'🟨';
  }
  if(type==='subst')return'🔄';
  if(type==='Var')return'📺';
  return'•';
}

// ── FETCH ──────────────────────────────────────────────────────
async function fetchAll(){
  const now=new Date();
  const deltas=[-2,-1,0,1,2,3,4,5];
  const days=deltas.map(d=>{const dt=new Date(now);dt.setUTCDate(dt.getUTCDate()+d);return isoDate(dt);});

  const results=await Promise.all(days.map(d=>
    fetch(`${BASE}/eventsday.php?d=${d}&s=Soccer`)
      .then(r=>r.json()).catch(()=>({events:null}))
  ));

  const all=results.flatMap(r=>r.events||[]);
  const map=new Map();
  for(const e of all)map.set(e.idEvent,e);
  const sorted=Array.from(map.values()).sort((a,b)=>a.strTimestamp.localeCompare(b.strTimestamp));

  const t=todayStr();
  S.all=sorted;
  S.today=sorted.filter(e=>e.dateEvent===t);
  S.past=sorted.filter(e=>e.dateEvent<t).sort((a,b)=>b.strTimestamp.localeCompare(a.strTimestamp));
  S.upcoming=sorted.filter(e=>e.dateEvent>t);

  // Auto-select best featured
  if(!S.selectedId){
    const live=sorted.filter(e=>statusOf(e)==='LIVE');
    const feat=live[0]||S.today.find(e=>statusOf(e)==='NS')||S.today.find(e=>statusOf(e)==='FT')||S.today[0]||S.past[0]||S.upcoming[0];
    if(feat)S.selectedId=feat.idEvent;
  }

  render();
}

function renderStatsPanel(ev){

  const fouls_h=Math.round(8+((seed*3)%8)), fouls_a=Math.round(8+((seed*5)%7));

  document.getElementById('stats-area').innerHTML=`

// ── LINEUP from TheSportsDB ────────────────────────────────────
async function fetchLineup(ev){
  try{
    const [hRes,aRes]=await Promise.all([
      fetch(`${BASE}/lookup_all_players.php?id=${ev.idHomeTeam}`).then(r=>r.json()).catch(()=>({player:null})),
      fetch(`${BASE}/lookup_all_players.php?id=${ev.idAwayTeam}`).then(r=>r.json()).catch(()=>({player:null})),
    ]);
    const pick=players=>{
      if(!players)return[];
      const posOrder={Goalkeeper:0,Defender:1,Midfielder:2,Forward:3,Attacker:3};
      const rank=p=>{
        for(const[k,v]of Object.entries(posOrder))if((p.strPosition||'').toLowerCase().includes(k.toLowerCase()))return v;
        return 5;
      };
      return [...players].sort((a,b)=>rank(a)-rank(b)).slice(0,11);
    };
    const home=pick(hRes.player), away=pick(aRes.player);
    renderLineup(home,away,ev);
  }catch(e){
    document.getElementById('lineup-content').innerHTML='<div class="no-data">Erro ao carregar escalação.</div>';
  }
}

function renderLineup(home,away,ev){
  const posLabel=p=>{
    const pos=(p.strPosition||'').toLowerCase();
    if(pos.includes('goal'))return'GK';
    if(pos.includes('def'))return'DEF';
    if(pos.includes('mid'))return'MID';
    if(pos.includes('for')||pos.includes('att'))return'ATK';
    return(p.strPosition||'').slice(0,3).toUpperCase();
  };
  const posSec=p=>{
    const pos=(p.strPosition||'').toLowerCase();
    if(pos.includes('goal'))return'Goleiro';
    if(pos.includes('def'))return'Defesa';
    if(pos.includes('mid'))return'Meio-campo';
    if(pos.includes('for')||pos.includes('att'))return'Ataque';
    return'Campo';
  };
  const posOrd=p=>{const s=posSec(p);return s==='Goleiro'?0:s==='Defesa'?1:s==='Meio-campo'?2:s==='Ataque'?3:4;};
  const groupBy=players=>{
    const sorted=[...players].sort((a,b)=>posOrd(a)-posOrd(b));
    const groups=[];
    for(const p of sorted){
      const sec=posSec(p);
      const last=groups[groups.length-1];
      if(last&&last.sec===sec)last.items.push(p);
      else groups.push({sec,items:[p]});
    }
    return groups;
  };

  const renderCol=(players,side)=>{
    const groups=groupBy(players);
    if(players.length===0)return`<div class="no-data" style="padding:12px">Dados não disponíveis</div>`;
    return groups.map(g=>`
      <div class="lsection">
        <div class="lsec-title">${g.sec}</div>
        ${g.items.map(p=>`
          <div class="litem ${side}">
            <span class="lnum ${side}">${p.strNumber||'—'}</span>
            <span class="lname">${p.strPlayer.split(' ').slice(-1)[0]}</span>
            ${p.strPosition?`<span class="lpos ${side}">${posLabel(p)}</span>`:''}
          </div>`).join('')}
      </div>`).join('');
  };

  document.getElementById('lineup-content').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:10px;text-transform:uppercase;letter-spacing:.3em;color:var(--muted)">
      <span style="color:var(--neon)">▸ ESCALAÇÃO</span>
      <span>TheSportsDB · ${home.length}+${away.length} jogadores</span>
    </div>
    <div class="lineups-grid">
      <div>
        <div class="lteam-title home">
          ${ev.strHomeTeamBadge?`<img src="${ev.strHomeTeamBadge}" onerror="this.style.display='none'" style="width:18px;height:18px;object-fit:contain">`:''}
          ${ev.strHomeTeam}
        </div>
        ${renderCol(home,'home')}
      </div>
      <div>
        <div class="lteam-title away">
          ${ev.strAwayTeamBadge?`<img src="${ev.strAwayTeamBadge}" onerror="this.style.display='none'" style="width:18px;height:18px;object-fit:contain">`:''}
          ${ev.strAwayTeam}
        </div>
        ${renderCol(away,'away')}
      </div>
    </div>`;
}

function switchTab(tab){
  S.matchTab=tab;
  ['today','past','upcoming'].forEach(t=>{
    document.getElementById(`tab-btn-${t}`)?.classList.toggle('active',t===tab);
  });
  renderMatchSection();
}

function renderMatchSection(){
  const tab=S.matchTab;
  const evs=tab==='today'?S.today:tab==='past'?S.past:S.upcoming;
  document.getElementById('section-info').textContent=`${evs.length} eventos`;
  const area=document.getElementById('matches-area');

  if(tab==='today'){
    if(evs.length===0){
      area.innerHTML=`<div class="no-data" style="padding:32px">Nenhum jogo hoje. Veja os próximos jogos →</div>`;
      return;
    }
    area.innerHTML=`<div class="match-grid">${evs.slice(0,20).map(e=>tile(e)).join('')}</div>`;
    return;
  }

  const groups=new Map();
  for(const e of evs){
    if(!groups.has(e.dateEvent))groups.set(e.dateEvent,[]);
    groups.get(e.dateEvent).push(e);
  }
  if(groups.size===0){
    area.innerHTML=`<div class="no-data" style="padding:32px">${tab==='past'?'Nenhum jogo nos últimos 2 dias.':'Nenhum jogo nos próximos 5 dias.'}</div>`;
    return;
  }
  area.innerHTML=Array.from(groups.entries()).map(([date,dayEvs])=>`
    <div class="date-group">
      <div class="date-header">
        <div class="date-label">${tab==='past'?'🕐':'🗓️'} ${fmtDate(date)}</div>
        <div class="date-divider"></div>
        <div class="date-count">${dayEvs.length} jogos</div>
      </div>
      <div class="match-grid">${dayEvs.slice(0,16).map(e=>tile(e)).join('')}</div>
    </div>`).join('');
}

function tile(e){
  const active=e.idEvent===S.selectedId;
  return`<button class="mtile${active?' active':''}" onclick="select('${e.idEvent}')">
    <div class="mtile-league">
      <span class="mtile-league-name">${e.strLeague}</span>
      ${sbadge(e)}
    </div>
    <div class="mteam">
      <div class="mteam-left">
        ${e.strHomeTeamBadge?`<img src="${e.strHomeTeamBadge}" onerror="this.style.display='none'" style="width:18px;height:18px;object-fit:contain">`:'<div style="width:18px;height:18px;background:var(--border);border-radius:3px;flex-shrink:0"></div>'}
        <span class="mteam-name">${e.strHomeTeam}</span>
      </div>
      <span class="mteam-score">${e.intHomeScore??'–'}</span>
    </div>
    <div class="mteam">
      <div class="mteam-left">
        ${e.strAwayTeamBadge?`<img src="${e.strAwayTeamBadge}" onerror="this.style.display='none'" style="width:18px;height:18px;object-fit:contain">`:'<div style="width:18px;height:18px;background:var(--border);border-radius:3px;flex-shrink:0"></div>'}
        <span class="mteam-name">${e.strAwayTeam}</span>
      </div>
      <span class="mteam-score">${e.intAwayScore??'–'}</span>
    </div>
    <div class="mtile-date">${fmtDate(e.dateEvent)} · ${fmtTime(e.strTimestamp)}</div>
  </button>`;
}

function select(id){
  S.selectedId=id;
  S.matchTab='today';
  switchTab('today');
  renderFeatured();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── SYNC ───────────────────────────────────────────────────────
function updateSync(){
  document.getElementById('sync-time').textContent=
    new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

fetchAll();
setInterval(fetchAll,15000);
setInterval(updateSync,1000);
</script>
</body>
</html>
